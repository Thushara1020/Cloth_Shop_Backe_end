spring:
  application:
    name: ClothStore

  datasource:
    url: jdbc:h2:mem:hardware_db
    driver-class-name: org.h2.Driver
    username: ra
    password: 1234

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
      show-sql: true


